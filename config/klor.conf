# Uncomment these two line to add support for encoders to your firmware
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# KLOR OLED Display — DISABLED: the OLED is not physically soldered on this
# build. Enabling ZMK_DISPLAY makes ZMK probe an SSD1306 over I2C that isn't
# there, which can stall boot / leave the board misbehaving. Re-enable only if
# you solder the display.
# CONFIG_ZMK_DISPLAY=y

# Per-key RGB underglow — DISABLED. The WS2812 strip is driven over SPI (MOSI
# on the pin set in boards/nice_nano.overlay). On this board the SPI transfer to
# the strip times out every cycle ("spi_nrfx_spim: Timeout waiting for transfer
# complete" / "Failed to update the RGB strip (-116)"), flooding logs and
# stalling the firmware. Either no strip is wired to that pin or the SPI wiring
# differs. Re-enable (and fix the WS2812 SPI pin/wiring) only when LEDs are
# actually present.
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP_SPI=y
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
# CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=40